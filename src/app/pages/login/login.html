<main class="login-page">
  <section class="login-card" aria-label="Formulario de inicio de sesion">
    <div class="icon-wrapper" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M7 11V8a5 5 0 0 1 10 0v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="2"/>
      </svg>
    </div>

    <h1>Bienvenido</h1>
    <p class="subtitle">Ingresa tus credenciales para continuar</p>

    <form novalidate [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field-group">
        <label for="email">Correo electronico</label>
        <div class="input-wrapper">
          <span class="input-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.8"/>
              <path d="m4 7 8 6 8-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <input
            id="email"
            type="email"
            placeholder="tu@email.com"
            autocomplete="email"
            formControlName="email"
          />
        </div>
      </div>

      <div class="field-group">
        <label for="password">Contrasena</label>
        <div class="input-wrapper">
          <span class="input-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.8"/>
              <path d="M8 11V8a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </span>
          <input
            id="password"
            [type]="hidePassword ? 'password' : 'text'"
            placeholder="********"
            autocomplete="current-password"
            formControlName="password"
          />
          <button
            type="button"
            class="toggle-password"
            aria-label="Mostrar u ocultar contrasena"
            (click)="togglePasswordVisibility()"
          >
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z" stroke="currentColor" stroke-width="1.8"/>
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="options-row">
        <label class="checkbox-row">
          <input type="checkbox" />
          <span>Recordarme</span>
        </label>
        <a href="#" class="muted-link">Olvidaste tu contrasena?</a>
      </div>
-
      <button class="submit-btn" type="submit">Iniciar sesion</button>

      <div class="divider"><span>O continua con</span></div>

      <div class="social-row">
        <button type="button" class="social-btn">
          <span class="social-icon google">G</span>
          <span>Google</span>
        </button>
        <button type="button" class="social-btn">
          <span class="social-icon facebook">f</span>
          <span>Facebook</span>
        </button>
      </div>
    </form>

    <p class="register-row">
      No tienes una cuenta?
      <a href="#">Registrate aqui</a>
    </p>
  </section>
</main>
